{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-body">

            <h4 class="mb-3">Total Expenses by Category</h4>

            <table class="table table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th>Category</th>
                        <th class="text-end">Total Expense ($)</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td colspan="2" class="text-center text-muted">
                            No expenses found.
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="text-end">
                <a href="#" class="btn btn-dark">
                    Add Expense
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
